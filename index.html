<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fullscreen Iframe</title>

  <style>
    /* RESET BASE */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* 🔥 evita scroll */
      background: #000; /* opcional */
      font-family: Arial, sans-serif;
    }

    /* CONTENEDOR PRINCIPAL */
    .iframe-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      /* Fix para mobile (viewport dinámico) */
      height: 100dvh;
    }

    /* IFRAME FULL */
    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Extra: evita comportamiento raro en mobile */
    body {
      overscroll-behavior: none;
      touch-action: manipulation;
    }
  </style>
</head>

<body>

  <div class="iframe-container">
    <iframe 
      src="AQUI_TU_LINK"
      loading="lazy"
      allowfullscreen
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

</body>
</html>
