<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title id="page-title">Cargando...</title>
  <link id="favicon" rel="icon" href="" />

  <style>
    /* 🔒 BLOQUEO GLOBAL */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;

      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }

    .iframe-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: auto;
    }

    /* LOADER */
    .loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      z-index: 10;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="loader" id="loader">Cargando...</div>

<div class="iframe-container">
  <iframe id="frame"></iframe>
</div>

<script>
/* =========================
   🔥 CONFIG DINÁMICA
========================= */
const params = new URLSearchParams(window.location.search);

const siteUrl = params.get("url") || "https://barryhartglass.com/";
const title = params.get("title") || "BARRYS";
const icon = params.get("icon") || "https://img.icons8.com/color/1200/domain--v1.jpg";

/* =========================
   🎯 ELEMENTOS
========================= */
const iframe = document.getElementById("frame");
const loader = document.getElementById("loader");
const favicon = document.getElementById("favicon");

/* =========================
   🧠 APLICAR CONFIG
========================= */
document.title = title;
if (icon) favicon.href = icon;

iframe.src = siteUrl;

iframe.onload = () => loader.classList.add("hidden");

/* =========================
   🔒 BLOQUEOS BÁSICOS
========================= */

// 🚫 Click derecho
document.addEventListener("contextmenu", e => e.preventDefault());

// 🚫 Selección (extra refuerzo)
document.addEventListener("selectstart", e => e.preventDefault());

// 🚫 Arrastrar imágenes
document.addEventListener("dragstart", e => e.preventDefault());

// 🚫 Mantener presionado (mobile)
document.addEventListener("touchstart", e => {
  if (e.touches.length > 1) return;
}, { passive: false });

/* =========================
   🚫 BLOQUEO DE TECLAS
========================= */
document.addEventListener("keydown", e => {

  // F12
  if (e.key === "F12") e.preventDefault();

  // Ctrl+Shift+I / J / C
  if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) {
    e.preventDefault();
  }

  // Ctrl+U (ver código)
  if (e.ctrlKey && e.key === "u") {
    e.preventDefault();
  }

  // Ctrl+S (guardar)
  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
  }

});

/* =========================
   🧠 DETECCIÓN DEVTOOLS
========================= */
setInterval(() => {
  const widthThreshold = window.outerWidth - window.innerWidth > 160;
  const heightThreshold = window.outerHeight - window.innerHeight > 160;

  if (widthThreshold || heightThreshold) {
    document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>Acceso restringido</h1>";
  }
}, 1000);

/* =========================
   🔒 VALIDACIÓN URL
========================= */
if (!siteUrl.startsWith("http")) {
  loader.innerText = "URL inválida";
  iframe.remove();
}
</script>

</body>
</html>
