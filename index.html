    <style>
        /* Reset total para eliminar cualquier espacio extra */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Evitamos el scroll en el body y html */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; /* Fondo estético para evitar destellos blancos */
        }

        /* Contenedor del Iframe */
        .iframe-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilos del Iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Propiedad clave para que el contenido interno intente no scrollear */
            overflow: hidden; 
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://darkturquoise-giraffe-322141.hostingersite.com/Demos/Graduacion/Invitacion-D00001/" 
            id="main-iframe"
            scrolling="no" 
            loading="lazy">
        </iframe>
    </div>

    <script>
        // Script para asegurar que el scroll se mantenga bloqueado incluso en interacciones táctiles
        document.addEventListener('touchmove', function (e) {
            if (e.target.tagName !== 'IFRAME') {
                e.preventDefault();
            }
        }, { passive: false });

        // Ajuste dinámico para navegadores móviles (problema de la barra de direcciones)
        function adjustHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            document.querySelector('.iframe-container').style.height = (window.innerHeight) + 'px';
        }

        window.addEventListener('resize', adjustHeight);
        window.addEventListener('orientationchange', adjustHeight);
        adjustHeight();
    </script>
</body>
